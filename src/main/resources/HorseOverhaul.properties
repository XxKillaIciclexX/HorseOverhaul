# Horse Overhaul configuration
#
# saddle_storage_slots controls how many storage slots the saddle bag has.
# It must be a positive multiple of 9.
# Rows are calculated automatically as saddle_storage_slots / 9.
saddle_storage_slots=9

# saddled_horse_petting_enabled controls whether saddled horses can still be petted.
# false keeps mount/inventory interactions from being interrupted by petting.
# Restart the server after changing this setting.
saddled_horse_petting_enabled=false
